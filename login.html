<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:white;">

<div style="width:300px;padding:20px;border:1px solid #ccc;border-radius:10px;">
<h2>Icare.az</h2>

<input id="name" placeholder="Ad" style="width:100%;padding:8px;margin:5px 0;">
<button onclick="getCode()" style="width:100%;">Kod al</button>

<input id="loginName" placeholder="Ad" style="width:100%;padding:8px;margin:5px 0;">
<input id="code" placeholder="Kod" style="width:100%;padding:8px;margin:5px 0;">
<button onclick="login()" style="width:100%;">Daxil ol</button>

<p id="msg"></p>
</div>

<script>

function getCode(){
  const name = document.getElementById("name").value.trim();

  if(!name){
    alert("Ad yaz!");
    return;
  }

  const code = Math.floor(1000 + Math.random()*9000).toString();

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({name: name, code: code});

  localStorage.setItem("users", JSON.stringify(users));

  document.getElementById("msg").innerText = "Kod: " + code;
}

function login(){

  const name = document.getElementById("loginName").value.trim();
  const code = document.getElementById("code").value.trim();

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(u => u.name === name && u.code === code);

  if(user){
    localStorage.setItem("user", name);
    window.location.href = "index.html";
  } else {
    alert("Ad və ya kod səhvdir!");
  }
}

</script>

</body>
</html>
