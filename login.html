<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  font-family:Arial;
  background:#f5f7fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  background:#2c6bed;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="name" placeholder="Ad">
<button onclick="generateCode()">Kod al</button>

<input id="loginName" placeholder="Ad">
<input id="loginCode" placeholder="Kod">
<button onclick="login()">Daxil ol</button>

<p id="msg"></p>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

function generateCode(){
  const name = document.getElementById("name").value;

  if(!name){
    alert("Ad yaz!");
    return;
  }

  const code = Math.floor(1000 + Math.random()*9000);

  users.push({ name, code });

  localStorage.setItem("users", JSON.stringify(users));

  document.getElementById("msg").innerText =
    "Kodun: " + code;
}

function login(){
  const name = document.getElementById("loginName").value;
  const code = document.getElementById("loginCode").value;

  const user = users.find(u => u.name === name && u.code == code);

  if(user){
    localStorage.setItem("currentUser", name);
    window.location.href = "index.html";
  } else {
    alert("Sehv!");
  }
}

</script>

</body>
</html>
