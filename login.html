<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="font-family:Arial;background:#2c6bed;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;padding:20px;border-radius:10px;width:280px;">
<h3>Hesab</h3>

<input id="name" placeholder="Ad" style="width:100%;padding:8px;margin:5px 0;">
<button onclick="getCode()" style="width:100%;padding:8px;">Kod al</button>

<input id="loginName" placeholder="Ad" style="width:100%;padding:8px;margin:5px 0;">
<input id="code" placeholder="Kod" style="width:100%;padding:8px;margin:5px 0;">
<button onclick="login()" style="width:100%;padding:8px;">Daxil ol</button>

<p id="msg"></p>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

function getCode(){
  const name = document.getElementById("name").value;
  if(!name){ alert("Ad yaz"); return; }

  const code = Math.floor(1000 + Math.random()*9000);
  users.push({name,code});
  localStorage.setItem("users",JSON.stringify(users));

  document.getElementById("msg").innerText = "Kod: " + code;
}

function login(){
  const n = document.getElementById("loginName").value;
  const c = document.getElementById("code").value;

  const u = users.find(x=>x.name===n && x.code==c);

  if(u){
    localStorage.setItem("user",n);
    window.location="index.html";
  } else {
    alert("Sehv");
  }
}
</script>

</body>
</html>
