<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icare.az</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.header{background:#2c6bed;color:white;padding:15px;display:flex;justify-content:space-between;}
.container{padding:20px;}
.form{background:white;padding:15px;margin-bottom:10px;border-radius:10px;}
input{padding:8px;margin:5px;}
button{padding:8px;background:#2c6bed;color:white;border:none;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:140px;object-fit:cover;}
</style>

</head>

<body>

<div class="header">
<h3>Icare.az</h3>
<div>
<span id="user"></span>
<button onclick="logout()">Çıxış</button>
</div>
</div>

<div class="container">

<div class="form">
<input id="brand" placeholder="Marka">
<input id="model" placeholder="Model">
<input id="price" placeholder="Qiymət">
<input id="location" placeholder="Ünvan">
<input id="phone" placeholder="Nömrə">
<input type="file" id="image">

<button onclick="addCar()">Əlavə et</button>
</div>

<div id="list" class="cards"></div>

</div>

<script>

if(!localStorage.getItem("user")){
  window.location="login.html";
}

document.getElementById("user").innerText = localStorage.getItem("user");

let cars = JSON.parse(localStorage.getItem("cars")) || [];

function addCar(){

  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const price = document.getElementById("price").value;
  const location = document.getElementById("location").value;
  const phone = document.getElementById("phone").value;
  const file = document.getElementById("image").files[0];

  if(!brand || !model || !price || !file){
    alert("Hamısını doldur!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    const car = {
      brand,
      model,
      price,
      location,
      phone,
      date: new Date().toLocaleString(),
      image: e.target.result
    };

    cars.push(car);

    localStorage.setItem("cars", JSON.stringify(cars));

    render();
  }

  reader.readAsDataURL(file);
}

function render(){
  const div = document.getElementById("list");
  div.innerHTML="";

  cars.forEach(c=>{
    div.innerHTML += `
    <div class="card">
      <img src="${c.image}">
      <b>${c.brand} ${c.model}</b>
      <p>${c.price} AZN</p>
      <p>${c.location}</p>
      <p>${c.phone}</p>
      <small>${c.date}</small>
    </div>`;
  });
}

function logout(){
  localStorage.removeItem("user");
  window.location="login.html";
}

render();

</script>

</body>
</html>
