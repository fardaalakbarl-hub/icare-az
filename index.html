<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icare.az</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f5f5f5;
    }

    .header{
      background:#2c6bed;
      color:white;
      padding:15px;
      text-align:center;
      font-size:22px;
    }

    .container{
      padding:15px;
    }

    .form{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    input, select{
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    button{
      padding:10px;
      background:#2c6bed;
      color:white;
      border:none;
      cursor:pointer;
      width:100%;
    }

    .cards{
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
      gap:10px;
    }

    .card{
      background:white;
      padding:10px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<div class="header">icare.az</div>

<div class="container">

  <div class="form">
    <input id="brand" placeholder="Marka">
    <input id="model" placeholder="Model">
    <input id="price" placeholder="Qiymet">

    <select id="fuel">
      <option>Benzin</option>
      <option>Dizel</option>
      <option>Elektrik</option>
    </select>

    <input id="location" placeholder="Seher">
    <input id="phone" placeholder="Nomre">

    <button onclick="addCar()">Elave et</button>
  </div>

  <div id="list" class="cards"></div>

</div>

<script>

const SUPABASE_URL = "https://irwhnuywppwsfcluaelt.supabase.co";
const SUPABASE_KEY = sb_publishable_3-DgPo74tGElnm0G6qko5Q_8vBpS46M";

const supabase = window.supabase.createClient(https://irwhnuywppwsfcluaelt.supabase.co, sb_publishable_3-DgPo74tGElnm0G6qko5Q_8vBpS46M);


// ADD
async function addCar(){

  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const price = document.getElementById("price").value;
  const fuel = document.getElementById("fuel").value;
  const location = document.getElementById("location").value;
  const phone = document.getElementById("phone").value;

  if(!brand || !model || !price){
    alert("Bos qoyma");
    return;
  }

  await supabase.from("cars").insert([
    { brand, model, price, fuel, location, phone }
  ]);

  loadCars();
}


// LOAD
async function loadCars(){

  const { data } = await supabase.from("cars").select("*").order("id", { ascending:false });

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(car => {
    list.innerHTML += `
      <div class="card">
        <h3>${car.brand} ${car.model}</h3>
        <p>${car.price} AZN</p>
        <p>${car.fuel}</p>
        <p>${car.location}</p>
        <p>${car.phone}</p>
      </div>
    `;
  });
}


// PAGE LOAD
loadCars();

</script>

</body>
</html>
