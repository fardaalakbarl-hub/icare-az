<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icare.az</title>

<style>
body{font-family:Arial;margin:0;background:#eef1f5;}

.header{
  display:flex;justify-content:space-between;
  background:#2c6bed;color:white;padding:10px;
}

.container{padding:15px;}

.form{background:white;padding:10px;margin-bottom:10px;border-radius:10px;}

input,select{padding:8px;margin:5px;}

button{padding:8px;background:#2c6bed;color:white;border:none;cursor:pointer;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}

.card{background:white;padding:10px;border-radius:10px;}

.card img{width:100%;height:140px;object-fit:cover;}

.details{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}

.details span{background:#ddd;padding:3px 6px;border-radius:5px;font-size:12px;}
</style>
</head>

<body>

<script>
let currentUser = localStorage.getItem("currentUser");
if(!currentUser){window.location.href="login.html";}
</script>

<div class="header">
  <b>🚗 Icare.az</b>
  <div>
    <span id="user"></span>
    <button onclick="logout()">Çıxış</button>
  </div>
</div>

<div class="container">

<div class="form">
<input id="brand" placeholder="Marka">
<input id="model" placeholder="Model">
<input id="price" placeholder="Qiymət">

<select id="fuel">
<option>Benzin</option>
<option>Hybrid</option>
<option>Elektro</option>
</select>

<input id="location" placeholder="Ünvan">
<input id="phone" placeholder="Telefon">

<input type="file" id="image">

<button onclick="addCar()">Əlavə et</button>
</div>

<div class="form">
<input id="search" placeholder="Axtar..." oninput="searchCars()">
</div>

<div id="cards" class="cards"></div>

</div>

<script>

document.getElementById("user").innerText = currentUser;

let cars = JSON.parse(localStorage.getItem("cars")) || [];

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  window.location.href="login.html";
}

// ADD
function addCar(){

  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const price = document.getElementById("price").value;
  const fuel = document.getElementById("fuel").value;
  const location = document.getElementById("location").value;
  const phone = document.getElementById("phone").value;

  const file = document.getElementById("image").files[0];

  if(!brand || !model || !price || !file){
    alert("Boş qoyma!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    cars.push({
      id:Date.now(),
      brand,
      model,
      price,
      fuel,
      location,
      phone,
      owner:currentUser,
      image:e.target.result
    });

    localStorage.setItem("cars", JSON.stringify(cars));

    render();
  }

  reader.readAsDataURL(file);
}

// RENDER
function render(list=cars){
  const div = document.getElementById("cards");
  div.innerHTML="";

  list.forEach(c=>{
    div.innerHTML += `
    <div class="card">
      <img src="${c.image}">
      <b>${c.brand} ${c.model}</b>

      <div class="details">
        <span>💰 ${c.price}</span>
        <span>⛽ ${c.fuel}</span>
        <span>👤 ${c.owner}</span>
        <span>📍 ${c.location}</span>
        <span>📞 ${c.phone}</span>
      </div>

      <a href="tel:${c.phone}">
        <button>📱 Zəng et</button>
      </a>

    </div>
    `;
  });
}

// SEARCH
function searchCars(){
  const text = document.getElementById("search").value.toLowerCase();

  const filtered = cars.filter(c =>
    (c.brand + " " + c.model).toLowerCase().includes(text)
  );

  render(filtered);
}

// INIT
render();

</script>

</body>
</html>
