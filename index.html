<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icare.az</title>
</head>

<body style="font-family:Arial;">

<h2>Icare.az</h2>

<button onclick="logout()">Çıxış</button>

<h3>Elan əlavə et</h3>

<input id="brand" placeholder="Marka"><br>
<input id="model" placeholder="Model"><br>
<input id="price" placeholder="Qiymət"><br>

<button onclick="addCar()">Əlavə et</button>

<hr>

<div id="list"></div>

<script>

// 🔐 LOGIN CHECK
if(!localStorage.getItem("user")){
  window.location = "login.html";
}

// DATA
let cars = JSON.parse(localStorage.getItem("cars")) || [];

// ADD
function addCar(){

  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const price = document.getElementById("price").value;

  if(!brand || !model || !price){
    alert("Doldur!");
    return;
  }

  cars.push({
    brand,
    model,
    price
  });

  localStorage.setItem("cars", JSON.stringify(cars));

  render();
}

// SHOW
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  cars.forEach(c=>{
    list.innerHTML += `
      <div>
        <b>${c.brand} ${c.model}</b> - ${c.price} AZN
      </div>
    `;
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location = "login.html";
}

render();

</script>

</body>
</html>
