<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icare.az</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#eef1f5;}
.header{
display:flex;justify-content:space-between;
background:#2c6bed;color:white;padding:10px;
}
.container{padding:15px;}
.form{background:white;padding:10px;margin-bottom:10px;}
input,select{padding:8px;margin:5px;}
button{padding:8px;background:#2c6bed;color:white;border:none;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:140px;object-fit:cover;}
</style>
</head>

<body>

<div class="header">
<h2>Icare.az</h2>
<button onclick="addCar()">Elave et</button>
</div>

<div class="container">

<div class="form">
<input id="brand" placeholder="Marka">
<input id="model" placeholder="Model">
<input id="price" placeholder="Qiymet">
<select id="fuel">
<option>Benzin</option>
<option>Hybrid</option>
<option>Elektro</option>
</select>
<input id="location" placeholder="Seher">
<input id="phone" placeholder="Nomre">
<input type="file" id="image">
</div>

<div id="list" class="cards"></div>

</div>

<script>

const SUPABASE_URL = "https://supabase.com/dashboard/project/irwhnuywppwsfcluaelt/settings/api-keys";
const SUPABASE_KEY = "sb_publishable_3-DgPo74tGElnm0G6qko5Q_8vBpS46M";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = "user" + Math.floor(Math.random()*1000);

// ADD CAR
async function addCar(){

const brand = document.getElementById("brand").value;
const model = document.getElementById("model").value;
const price = document.getElementById("price").value;
const fuel = document.getElementById("fuel").value;
const location = document.getElementById("location").value;
const phone = document.getElementById("phone").value;

const file = document.getElementById("image").files[0];

if(!brand || !model || !price || !file){
alert("Bos qoyma!");
return;
}

const reader = new FileReader();

reader.onload = async function(e){

await supabase.from("cars").insert([{
brand,model,price,fuel,location,phone,
owner: currentUser,
image: e.target.result
}]);

loadCars();
};

reader.readAsDataURL(file);
}

// LOAD
async function loadCars(){

const { data } = await supabase.from("cars").select("*");

render(data);
}

// RENDER
function render(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(car=>{
list.innerHTML += `
<div class="card">
<img src="${car.image}">
<h3>${car.brand} ${car.model}</h3>
<p>${car.price} AZN</p>
<p>${car.fuel}</p>
<p>${car.location}</p>
<p>${car.phone}</p>
</div>
`;
});

}

// START
loadCars();

</script>

</body>
</html>
