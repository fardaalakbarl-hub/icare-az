<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icare.az</title>
<style>
body{font-family:Arial;margin:0;background:#eef1f5;}
.header{
display:flex;justify-content:space-between;
background:#2c6bed;color:white;padding:10px;
}
.container{padding:15px;}
.form{background:white;padding:10px;margin-bottom:10px;}
input,select{padding:8px;margin:5px;}
button{padding:8px;background:#2c6bed;color:white;border:none;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.card{background:white;padding:10px;border-radius:10px;}
.card img{width:100%;height:140px;object-fit:cover;}
</style>
</head>

<body>

<div class="header">
<h2>Icare.az</h2>
<button onclick="addCar()">Elave et</button>
</div>

<div class="container">

<div class="form">
<input id="brand" placeholder="Marka">
<input id="model" placeholder="Model">
<input id="price" placeholder="Qiymet">
<select id="fuel">
<option>Benzin</option>
<option>Hybrid</option>
<option>Elektro</option>
</select>
<input id="location" placeholder="Seher">
<input id="phone" placeholder="Nomre">
<input type="file" id="image">
</div>

<div id="list" class="cards"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://irwhnuywppwsfcluaelt.supabase.co";
const SUPABASE_KEY = "sb_..."; // səndə olan key

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function addCar(){
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const price = document.getElementById("price").value;

  if(!brand || !model || !price){
    alert("Boş qoyma");
    return;
  }

  const { error } = await supabase
    .from("cars")
    .insert([{ brand, model, price }]);

  if(error){
    console.log(error);
    alert("Xəta oldu");
  } else {
    alert("Əlavə olundu");
  }
}

window.addCar = addCar;
</script>
</script>

</body>
</html>
